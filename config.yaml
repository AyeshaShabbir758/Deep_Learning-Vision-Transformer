dataset:
  name: "bloodmnist"
  image_size: 224
  batch_size: 32

model:
  name: "google/vit-base-patch16-224"
  dropout: 0.1
  freeze_layers: 6

training:
  num_epochs: 15
  learning_rate: 2e-4
  weight_decay: 1e-2
  warmup_ratio: 0.1
  label_smoothing: 0.1
  use_fp16: true
  grad_clip: 1.0
  seed: 42

paths:
  output_dir: "./results"
  checkpoint_dir: "./checkpoints"